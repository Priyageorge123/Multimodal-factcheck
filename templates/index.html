<!DOCTYPE html>
<html>
<head>
    <title>Image Analysis and Caption Search</title>
</head>
<body>
    <h1>Search by Image or Caption</h1>
    <form method="POST">
        <label for="image_url">Enter Image URL:</label><br>
        <input type="text" id="image_url" name="image_url" size="50">
        <input type="submit" value="Search"><br><br>

        <label for="caption">Enter Caption:</label><br>
        <input type="text" id="caption" name="caption" size="50">

        <input type="submit" value="Search">
    </form>
</body>
</html>
